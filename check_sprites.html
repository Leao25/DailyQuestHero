<!DOCTYPE html>
<html><body>
<pre id="out"></pre>
<script>
const names = ['hero_darknight','hero_warrior','hero_hunter','hero_mage','hero_cleric'];
const results = [];
let loaded = 0;
names.forEach(n => {
  const img = new Image();
  img.onload = () => {
    results.push(`${n}: ${img.naturalWidth} x ${img.naturalHeight}`);
    if (++loaded === names.length) {
      document.getElementById('out').textContent = results.sort().join('\n');
    }
  };
  img.src = `assets/sprites/${n}.png`;
});
</script>
</body></html>
