<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DailyQuestHero — Protótipo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="fullscreen-btn" title="Tela cheia">⛶</button>

  <div id="game-container">
    <canvas id="game-canvas" width="960" height="540"></canvas>

    <!-- HUD sobreposto ao canvas -->
    <div id="hud">
      <div id="hero-stats">
        <div class="stat-row">
          <span class="stat-label">Hero — Lv. <span id="hero-level">1</span></span>
        </div>
        <div class="bar-wrapper">
          <div class="bar-bg">
            <div id="hp-bar" class="bar-fill hp"></div>
          </div>
          <span class="bar-text" id="hp-text">100/100</span>
        </div>
        <div class="bar-wrapper">
          <div class="bar-bg">
            <div id="xp-bar" class="bar-fill xp"></div>
          </div>
          <span class="bar-text" id="xp-text">0/100 XP</span>
        </div>
      </div>

      <div id="clock-display">
        <div id="clock-top">
          <span id="period-icon">🌅</span>
          <span id="period-name">--</span>
        </div>
        <div id="clock-time">--:--</div>
        <div id="clock-arc-wrap">
          <div id="clock-arc-fill"></div>
        </div>
      </div>
    </div>

    <!-- Log de eventos (drops, level up etc) -->
    <div id="event-log"></div>

    <!-- Botão da mochila -->
    <button id="bag-btn" title="Mochila (B)">🎒</button>

    <!-- Painel da mochila -->
    <div id="bag-panel" class="hidden">
      <div id="bag-header">
        <span>🎒 Mochila</span>
        <button id="bag-close">✕</button>
      </div>

      <!-- Slots de equipamento -->
      <div id="equip-section">
        <div class="equip-label">Equipamento</div>
        <div id="equip-slots">
          <div class="equip-slot" data-slot="weapon"  title="Arma">⚔️</div>
          <div class="equip-slot" data-slot="armor"   title="Armadura">🛡️</div>
          <div class="equip-slot" data-slot="accessory" title="Acessório">📿</div>
        </div>
      </div>

      <div class="bag-divider"></div>

      <!-- Grid de itens -->
      <div id="bag-grid"></div>

      <!-- Detalhe do item selecionado -->
      <div id="item-detail" class="hidden">
        <div id="detail-name"></div>
        <div id="detail-desc"></div>
        <div id="detail-bonus"></div>
        <div id="detail-value"></div>
        <button id="detail-equip" class="hidden">Equipar</button>
        <button id="detail-unequip" class="hidden">Desequipar</button>
      </div>
    </div>
  </div>

  <!-- Scripts do jogo, em ordem de dependência -->
  <script src="js/config.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/dayCycle.js"></script>
  <script src="js/items.js"></script>
  <script src="js/save.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/mob.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/bag.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/game.js"></script>
  <script>
    const btn       = document.getElementById('fullscreen-btn');
    const container = document.getElementById('game-container');
    let isScaled    = false;

    function applyScale() {
      const scaleX = window.innerWidth  / 960;
      const scaleY = window.innerHeight / 540;
      const scale  = Math.min(scaleX, scaleY); // mantém proporção
      container.style.transform = `scale(${scale})`;
    }

    function enterFullscreen() {
      isScaled = true;
      document.body.style.overflow = 'hidden';
      applyScale();
      window.addEventListener('resize', applyScale);
      btn.textContent = '✕';
      btn.title = 'Sair da tela cheia';
    }

    function exitFullscreen() {
      isScaled = false;
      document.body.style.overflow = '';
      container.style.transform = '';
      window.removeEventListener('resize', applyScale);
      btn.textContent = '⛶';
      btn.title = 'Tela cheia';
    }

    btn.addEventListener('click', () => {
      isScaled ? exitFullscreen() : enterFullscreen();
    });

    // ESC para sair
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && isScaled) exitFullscreen();
    });
  </script>
</body>
</html>
